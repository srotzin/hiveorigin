services:
  - type: web
    name: hiveorigin
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: node start.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: ORIGIN_SIGNING_SEED
        generateValue: true
      - key: HIVE_INTERNAL_KEY
        generateValue: true
